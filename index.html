<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Life Super App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="text-center p-4 bg-danger text-white">

    <h1 class="fw-bold">William Jewell College</h1>
    <p class="lead">Campus Life Super App</p>

    <img src="images/logos.png"
         alt="College logo"
         class="img-fluid mx-auto d-block"
         style="max-width: 120px;">

    <section class="mt-3">
        <h2>Today's Date</h2>
        <p id="date"></p>
    </section>

    <button id="toggleBtn" class="btn btn-light btn-sm mt-2">
        Toggle Dark Mode
    </button>

</header>

<nav class="text-center p-2 bg-dark">
    <a href="index.html" class="text-white mx-3">Home</a>
    <a href="events.html" class="text-white mx-3">Events</a>
    <a href="dining.html" class="text-white mx-3">Dining</a>
</nav>

<main class="container py-4">

    <section class="card p-3 mb-3 text-center">
        <h2>Campus Weather</h2>
        <p id="weather-data">Loading weather...</p>
    </section>

    <section class="card p-3 mb-3 text-center">
        <h2>Campus Events</h2>

        <img src="images/NCAA_logo.svg.png"
             alt="Cardinal logo"
             class="img-fluid mx-auto d-block"
             style="max-width: 100px;">

        <p>Stay updated with events happening on campus.</p>
        <a href="events.html" class="btn btn-primary">View Events</a>
    </section>

    <section class="card p-3 mb-3 text-center">
        <h2>Dining Options</h2>

        <img src="images/Fxlogo.png"
             alt="FreshX logo"
             class="img-fluid mx-auto d-block"
             style="max-width: 100px;">

        <p>Explore campus dining locations and menus.</p>
        <a href="dining.html" class="btn btn-primary">View Dining</a>
    </section>

</main>

<footer class="text-center p-3 bg-dark text-white">
    <p>&copy; 2026 Campus Life Super App</p>
</footer>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
